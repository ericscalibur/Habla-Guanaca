// ============================================================
// GIR SCHEDULING
// ============================================================
function buildLessonSequence(newItems, priorReviews = []) {
  const sequence = [], reviewQueue = [], intervals = [2,4,8,15];
  let position = 0;
  const priorCopy = [...priorReviews];
  const priorInsertAt = [2, 6]; // insert carry-over items after 3rd and 7th new items
  for (let i = 0; i < newItems.length; i++) {
    while (reviewQueue.length > 0 && reviewQueue[0].nextAt <= position) {
      const review = reviewQueue.shift();
      sequence.push({...review.item, type:"review", reviewNum:review.reviewNum});
      const nextIdx = intervals.indexOf(review.interval);
      // Optional per-item cap: maxReviews limits how many times a word resurfaces.
      const cap = (review.item.maxReviews === undefined) ? intervals.length : review.item.maxReviews;
      if (review.reviewNum < cap && nextIdx < intervals.length-1) {
        reviewQueue.push({item:review.item, interval:intervals[nextIdx+1], nextAt:position+intervals[nextIdx+1], reviewNum:review.reviewNum+1});
        reviewQueue.sort((a,b)=>a.nextAt-b.nextAt);
      }
      position++;
    }
    if (priorInsertAt.includes(i) && priorCopy.length > 0) {
      sequence.push({...priorCopy.shift(), type:"priorReview"});
      position++;
    }
    sequence.push({...newItems[i], type:"new"});
    position++;
    if (newItems[i].maxReviews === undefined || newItems[i].maxReviews >= 1) {
      reviewQueue.push({item:newItems[i], interval:intervals[0], nextAt:position+intervals[0], reviewNum:1});
      reviewQueue.sort((a,b)=>a.nextAt-b.nextAt);
    }
  }
  while (priorCopy.length > 0) {
    sequence.push({...priorCopy.shift(), type:"priorReview"});
  }
  let extra=0;
  while (reviewQueue.length>0 && extra<10) {
    const review = reviewQueue.shift();
    sequence.push({...review.item, type:"review", reviewNum:review.reviewNum});
    extra++;
  }
  // Never let the same expression appear back-to-back: pull a later
  // different item into the slot, or relocate the duplicate to a safe gap.
  const sgKey = s => s.targetEs;
  for (let pass=0; pass<sequence.length; pass++) {
    let clean = true;
    for (let i=1; i<sequence.length; i++) {
      if (sgKey(sequence[i]) !== sgKey(sequence[i-1])) continue;
      clean = false;
      let j = -1;
      for (let k=i+1; k<sequence.length; k++) {
        if (sgKey(sequence[k]) !== sgKey(sequence[i-1]) && (i+1>=sequence.length || sgKey(sequence[k]) !== sgKey(sequence[i+1]))) { j=k; break; }
      }
      if (j >= 0) { const m = sequence.splice(j,1)[0]; sequence.splice(i,0,m); }
      else { const x = sequence.splice(i,1)[0]; let p=1; for(; p<sequence.length; p++){ if(sgKey(sequence[p-1])!==sgKey(x) && sgKey(sequence[p])!==sgKey(x)) break; } sequence.splice(Math.min(p,sequence.length),0,x); }
      break;
    }
    if (clean) break;
  }
  return sequence;
}

function getSpanishVoices() {
  if (!window.speechSynthesis) return [];
  return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("es")).sort((a,b)=>{
    const sc=v=>{let s=0;const n=v.name.toLowerCase();if(n.includes("google"))s+=10;if(n.includes("neural")||n.includes("natural"))s+=10;if(n.includes("premium"))s+=8;if(n.includes("enhanced"))s+=5;if(n.includes("compact"))s-=10;if(v.lang==="es-ES")s-=20;if(v.lang==="es-SV")s+=6;if(v.lang==="es-419"||v.lang==="es-MX")s+=4;if(v.lang==="es-US")s+=3;if(v.lang!=="es-ES"&&v.lang!=="es")s+=2;return s;};
    return sc(b)-sc(a);
  });
}
function getEnglishVoices() {
  if (!window.speechSynthesis) return [];
  return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en")).sort((a,b)=>{
    const sc=v=>{let s=0;const n=v.name.toLowerCase();if(n.includes("google"))s+=10;if(n.includes("neural")||n.includes("natural"))s+=10;if(n.includes("premium"))s+=8;if(n.includes("enhanced"))s+=5;if(n.includes("compact"))s-=10;if(v.lang==="en-US")s+=3;return s;};
    return sc(b)-sc(a);
  });
}
function speakWithVoice(text,voice,rate=0.85){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(voice){u.voice=voice;u.lang=voice.lang;}
    u.rate=rate;u.onend=resolve;u.onerror=resolve;
    window.speechSynthesis.speak(u);
  });
}

let AUDIO_BUNDLE = {};

function playBundledAudio(itemId, lang) {
  return new Promise(resolve => {
    if (!AUDIO_BUNDLE || !AUDIO_BUNDLE[itemId] || !AUDIO_BUNDLE[itemId][lang]) { resolve(false); return; }
    const audio = new Audio(AUDIO_BUNDLE[itemId][lang]);
    audio.onended = () => resolve(true);
    audio.onerror = () => resolve(false);
    audio.play().catch(() => resolve(false));
  });
}

// Normalize for comparison: lowercase, strip accents/diacritics & punctuation, collapse spaces.
function sgNormalize(s) {
  return (s || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
// Does a (normalized) transcript contain the (normalized) answer as a whole-word run?
function sgPhraseMatch(transcript, answer) {
  if (!answer) return false;
  if (transcript === answer) return true;
  return (" " + transcript + " ").indexOf(" " + answer + " ") !== -1;
}
// Check a recognition event's alternatives against an item's accepted answers.
function sgEventMatches(event, acceptNorm) {
  for (let i = event.resultIndex; i < event.results.length; i++) {
    const res = event.results[i];
    for (let a = 0; a < res.length; a++) {
      const t = sgNormalize(res[a].transcript);
      for (let k = 0; k < acceptNorm.length; k++) {
        if (sgPhraseMatch(t, acceptNorm[k])) return true;
      }
    }
  }
  return false;
}

// Short success chime via WebAudio (no asset needed).
let _sgAudioCtx = null;
function sgChime() {
  try {
    _sgAudioCtx = _sgAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _sgAudioCtx, now = ctx.currentTime;
    [880, 1320].forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = freq;
      o.connect(g); g.connect(ctx.destination);
      const t = now + i * 0.09;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      o.start(t); o.stop(t + 0.2);
    });
  } catch (e) {}
}

// Helper: given the current level+lesson, what comes next?
function sgFindNext(level, lesson) {
  const lvIdx = SEEGUESS_LEVELS.findIndex(l => l.id === level.id);
  if (lvIdx < 0) return null;
  const lsIdx = SEEGUESS_LEVELS[lvIdx].lessons.findIndex(l => l.id === lesson.id);
  // next lesson in same level
  if (lsIdx + 1 < SEEGUESS_LEVELS[lvIdx].lessons.length) {
    return {level: SEEGUESS_LEVELS[lvIdx], lesson: SEEGUESS_LEVELS[lvIdx].lessons[lsIdx + 1], isNextLevel: false};
  }
  // first lesson of next level
  if (lvIdx + 1 < SEEGUESS_LEVELS.length && SEEGUESS_LEVELS[lvIdx + 1].lessons.length > 0) {
    return {level: SEEGUESS_LEVELS[lvIdx + 1], lesson: SEEGUESS_LEVELS[lvIdx + 1].lessons[0], isNextLevel: true};
  }
  return null;
}

function SeeGuessRound({level, lesson, recogLang, onExit, onPlay}) {
  const items = lesson.items;
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState("listening"); // listening | correct | reveal | done
  const [remaining, setRemaining] = useState(10);
  const [heard, setHeard] = useState("");
  const [micDenied, setMicDenied] = useState(false);
  const [imgBroken, setImgBroken] = useState(false);
  const [extIdx, setExtIdx] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);

  const resultsRef = useRef([]);
  const roundStartRef = useRef(null);
  const mountedRef = useRef(true);

  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

  // Reset image state whenever the image changes.
  useEffect(() => { setImgBroken(false); setExtIdx(0); setHeard(""); }, [idx]);

  // Core listening loop for the current image.
  useEffect(() => {
    if (phase !== "listening") return;
    if (roundStartRef.current == null) roundStartRef.current = Date.now();
    const item = items[idx];
    const acceptNorm = item.accept.map(sgNormalize);
    const itemStart = Date.now();
    const deadline = itemStart + SG_LIMIT_MS;
    let stopped = false, done = false;

    setRemaining(10);
    const tick = setInterval(() => {
      const left = deadline - Date.now();
      if (mountedRef.current) setRemaining(Math.max(0, Math.ceil(left / 1000)));
      if (left <= 0) finish(false, SG_LIMIT_MS);
    }, 100);

    const recog = new SpeechRecognitionImpl();
    recog.lang = recogLang || "es-US";
    recog.continuous = true;
    recog.interimResults = true;
    recog.maxAlternatives = 6;
    recog.onresult = (e) => {
      // show what we last heard (interim feedback)
      const last = e.results[e.results.length - 1];
      if (last && last[0] && mountedRef.current) setHeard(last[0].transcript);
      if (sgEventMatches(e, acceptNorm)) finish(true, Date.now() - itemStart);
    };
    recog.onerror = (e) => {
      if (e.error === "not-allowed" || e.error === "service-not-allowed") {
        stopped = true;
        if (mountedRef.current) setMicDenied(true);
      }
    };
    recog.onend = () => { if (!stopped && !done) { try { recog.start(); } catch (err) {} } };
    try { recog.start(); } catch (err) {}

    function finish(correct, ms) {
      if (done) return;
      done = true; stopped = true;
      clearInterval(tick);
      try { recog.abort(); } catch (err) {}
      resultsRef.current[idx] = {correct, ms};
      if (!mountedRef.current) return;
      if (correct) { sgChime(); setPhase("correct"); }
      else setPhase("reveal");
    }

    return () => { stopped = true; done = true; clearInterval(tick); try { recog.abort(); } catch (err) {} };
  }, [phase, idx, items, recogLang]);

  // Advance after the correct-flash or the reveal.
  useEffect(() => {
    if (phase !== "correct" && phase !== "reveal") return;
    const delay = phase === "correct" ? SG_CORRECT_MS : SG_REVEAL_MS;
    const t = setTimeout(() => {
      if (!mountedRef.current) return;
      if (idx + 1 >= items.length) {
        setElapsedMs(Date.now() - (roundStartRef.current || Date.now()));
        setPhase("done");
      } else {
        setIdx(idx + 1);
        setPhase("listening");
      }
    }, delay);
    return () => clearTimeout(t);
  }, [phase, idx, items]);

  if (micDenied) {
    return <SeeGuessGate onExit={onExit} title="Microphone blocked"
      message="See & Say can't hear you without mic access. Allow the microphone for this site in your browser settings, then come back."/>;
  }

  // RESULTS
  if (phase === "done") {
    const results = resultsRef.current;
    const right = results.filter(r => r && r.correct).length;
    const wrong = items.length - right;
    const secs = Math.round(elapsedMs / 1000);
    const next = sgFindNext(level, lesson);
    return (
      <div className="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-6 max-w-lg mx-auto">
        <div className="text-center w-full max-w-xs">
          <div className="text-6xl mb-3">{right === items.length ? "🏆" : right >= items.length * 0.7 ? "🎉" : "💪"}</div>
          <h2 className="text-2xl font-bold mb-1">{lesson.title}</h2>
          <p className="text-gray-400 text-sm mb-6">{level.name} · {level.subtitle}</p>
          <div className="grid grid-cols-3 gap-3 mb-6">
            <div className="bg-gray-900 rounded-xl p-3 border border-gray-800"><p className="text-2xl font-bold text-emerald-400">{right}</p><p className="text-xs text-gray-500">Right</p></div>
            <div className="bg-gray-900 rounded-xl p-3 border border-gray-800"><p className="text-2xl font-bold text-rose-400">{wrong}</p><p className="text-xs text-gray-500">Wrong</p></div>
            <div className="bg-gray-900 rounded-xl p-3 border border-gray-800"><p className="text-2xl font-bold text-blue-400">{secs}s</p><p className="text-xs text-gray-500">Total</p></div>
          </div>
          <div className="space-y-3">
            <button onClick={()=>onPlay(level, lesson)} className="w-full py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm"><IconRotate size={16}/> Repeat lesson</button>
            {next && <button onClick={()=>onPlay(next.level, next.lesson)} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">{next.isNextLevel ? "Next level" : "Next lesson"}: {next.lesson.title} <IconChevronRight size={16}/></button>}
            <button onClick={onExit} className="w-full py-2 text-gray-500 hover:text-gray-300 text-sm transition-colors">Back to menu</button>
          </div>
        </div>
      </div>
    );
  }

  // ROUND (listening / correct / reveal)
  const item = items[idx];
  const progress = ((idx + (phase === "listening" ? 0 : 1)) / items.length) * 100;
  return (
    <div className="min-h-screen bg-gray-950 text-white flex flex-col max-w-lg mx-auto">
      <div className="p-3 flex items-center gap-3">
        <button onClick={onExit} className="p-1.5 text-gray-500 hover:text-gray-300"><IconChevronLeft size={20}/></button>
        <div className="flex-1">
          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-rose-500 to-amber-500 rounded-full transition-all duration-300" style={{width:`${progress}%`}}/></div>
          <div className="flex justify-between mt-1"><span className="text-xs text-gray-500">{lesson.title}</span><span className="text-xs text-gray-500">{idx+1}/{items.length}</span></div>
        </div>
      </div>

      <div className="flex-1 flex flex-col items-center justify-center p-6">
        {/* Image + word-on-miss overlay */}
        <div className="relative w-full max-w-sm aspect-square rounded-2xl overflow-hidden bg-gray-900 border border-gray-800 flex items-center justify-center mb-6">
          {imgBroken
            ? <div className="text-center text-gray-600 p-6"><div className="text-5xl mb-2">🖼️</div><p className="text-xs">image missing</p></div>
            : <img src={item.image.replace(/\.(png|jpe?g|webp)$/i,"") + "." + SG_IMG_EXTS[extIdx]} alt="" onError={()=>{ if (extIdx < SG_IMG_EXTS.length-1) setExtIdx(extIdx+1); else setImgBroken(true); }} className="w-full h-full object-cover" draggable={false}/>}
          {phase === "correct" && (
            <div className="absolute inset-0 bg-emerald-600/85 flex items-center justify-center">
              <div className="text-center"><IconCheck size={56} className="text-white mx-auto mb-1"/><p className="text-2xl font-bold text-white">{item.answer}</p></div>
            </div>
          )}
          {phase === "reveal" && (
            <div className="absolute inset-0 bg-black/80 flex flex-col items-center justify-center">
              <p className="text-gray-400 text-xs mb-1 uppercase tracking-wider">Time's up</p>
              <p className="text-3xl font-bold text-amber-400 px-4 text-center">{item.answer}</p>
            </div>
          )}
        </div>

        {phase === "listening" && (
          <div className="text-center w-full max-w-sm">
            <div className="flex items-center justify-center gap-2 mb-2">
              <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-500 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span></span>
              <span className="text-rose-300 text-sm font-medium">Listening… say what you see</span>
            </div>
            <p className="text-4xl font-bold font-mono mb-2" style={{color: remaining <= 3 ? "#f59e0b" : "#9ca3af"}}>{remaining}</p>
            <p className="text-gray-600 text-xs h-4 italic">{heard ? "“" + heard + "”" : " "}</p>
            <button onClick={()=>{ resultsRef.current[idx] = {correct:false, ms:SG_LIMIT_MS}; setPhase("reveal"); }}
              className="mt-4 px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-400 transition-colors flex items-center gap-2 mx-auto"><IconSkipFwd size={14}/> Skip</button>
          </div>
        )}
      </div>
    </div>
  );
}

function HablaGuanaca() {
  const [screen,setScreen]=useState("home");
  const [selectedLesson,setSelectedLesson]=useState(null);
  const [completedLessons,setCompletedLessons]=useState(()=>{try{return JSON.parse(localStorage.getItem("habla-completed")||"{}") }catch(e){return{}}});
  const [sequence,setSequence]=useState([]);
  const [currentIdx,setCurrentIdx]=useState(0);
  const [phase,setPhase]=useState("intro");
  const [showSettings,setShowSettings]=useState(false);
  const [pauseDuration,setPauseDuration]=useState(4);
  const [speechRate,setSpeechRate]=useState(0.85);
  const [showPronunciation,setShowPronunciation]=useState(true);
  const [autoAdvance,setAutoAdvance]=useState(true);
  const [ttsEnabled,setTtsEnabled]=useState(true);
  const [spanishVoices,setSpanishVoices]=useState([]);
  const [englishVoices,setEnglishVoices]=useState([]);
  const [selectedSpanishVoice,setSelectedSpanishVoice]=useState(null);
  const [selectedEnglishVoice,setSelectedEnglishVoice]=useState(null);
  const [timer,setTimer]=useState(0);
  const [sgLevel,setSgLevel]=useState(null);
  const [sgLesson,setSgLesson]=useState(null);
  const [sgPlayCount,setSgPlayCount]=useState(0);
  const [isHolding,setIsHolding]=useState(false);
  const isHoldingRef=useRef(false);
  const timerRef=useRef(null);
  const isMountedRef=useRef(true);
  const holdTimer=useCallback((e)=>{try{e.preventDefault();e.currentTarget.setPointerCapture?.(e.pointerId);}catch{}isHoldingRef.current=true;setIsHolding(true);},[]);
  const releaseTimer=useCallback(()=>{isHoldingRef.current=false;setIsHolding(false);},[]);

  useEffect(()=>{
    const loadVoices=()=>{
      const es=getSpanishVoices(),en=getEnglishVoices();
      if(es.length>0){setSpanishVoices(es);setSelectedSpanishVoice(p=>p||es[0]);}
      if(en.length>0){setEnglishVoices(en);setSelectedEnglishVoice(p=>p||en[0]);}
    };
    if(window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
    return()=>{isMountedRef.current=false;if(window.speechSynthesis)window.speechSynthesis.cancel();if(timerRef.current)clearInterval(timerRef.current);};
  },[]);

  const speakEs=useCallback(async(text,itemId)=>{
    if(!ttsEnabled)return;
    if(AUDIO_BUNDLE && itemId){const ok=await playBundledAudio(itemId,"es");if(ok)return;}
    await speakWithVoice(text,selectedSpanishVoice,speechRate);
  },[ttsEnabled,selectedSpanishVoice,speechRate]);

  const speakEn=useCallback(async(text,itemId)=>{
    if(!ttsEnabled)return;
    if(AUDIO_BUNDLE && itemId){const ok=await playBundledAudio(itemId,"en");if(ok)return;}
    await speakWithVoice(text,selectedEnglishVoice,speechRate);
  },[ttsEnabled,selectedEnglishVoice,speechRate]);

  const startLesson=useCallback(lesson=>{
    setSelectedLesson(lesson);setSequence(buildLessonSequence(lesson.newItems, lesson.priorReview||[]));setCurrentIdx(0);setPhase("intro");setScreen("lesson");
  },[]);

  const playSeeGuess=useCallback((level,lesson)=>{
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    setSgLevel(level);setSgLesson(lesson);setSgPlayCount(c=>c+1);setScreen("sgRound");
  },[]);

  const goToPrompt=useCallback(async()=>{
    setPhase("prompt");
    const item=sequence[currentIdx];
    if(item)await speakEn(item.promptEn,item.id);
    if(autoAdvance&&isMountedRef.current)setTimeout(()=>{if(isMountedRef.current)setPhase("anticipate");},800);
  },[sequence,currentIdx,speakEn,autoAdvance]);

  useEffect(()=>{
    if(phase==="anticipate"){
      setTimer(pauseDuration);
      timerRef.current=setInterval(()=>{if(isHoldingRef.current)return;setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setPhase("reveal");return 0;}return t-1;});},1000);
    }
    return()=>{if(timerRef.current)clearInterval(timerRef.current);isHoldingRef.current=false;setIsHolding(false);};
  },[phase,pauseDuration]);

  useEffect(()=>{
    if(phase==="reveal"){const item=sequence[currentIdx];if(item)speakEs(item.targetEs,item.id);}
  },[phase]);

  const nextItem=useCallback(()=>{
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    if(currentIdx+1>=sequence.length){setCompletedLessons(p=>{const n={...p,[selectedLesson.id]:true};try{localStorage.setItem("habla-completed",JSON.stringify(n))}catch(e){}return n;});setScreen("complete");}
    else{
      const nextI=currentIdx+1;setCurrentIdx(nextI);setPhase("prompt");
      setTimeout(async()=>{
        const nd=sequence[nextI];
        if(nd)await speakEn(nd.promptEn,nd.id);
        if(autoAdvance&&isMountedRef.current)setTimeout(()=>{if(isMountedRef.current)setPhase("anticipate");},800);
      },300);
    }
  },[currentIdx,sequence,selectedLesson,speakEn,autoAdvance]);

  const skipToReveal=useCallback(()=>{if(timerRef.current)clearInterval(timerRef.current);setTimer(0);setPhase("reveal");},[]);

  const replayAudio=useCallback(()=>{
    const item=sequence[currentIdx];if(!item||!ttsEnabled)return;
    if(phase==="prompt")speakEn(item.promptEn,item.id);else speakEs(item.targetEs,item.id);

    <SeeGuessRound key={sgLesson.id+"-"+sgPlayCount} level={sgLevel} lesson={sgLesson} recogLang={sgRecogLang}

  // HOME
  if(screen==="home") return (

        <p className="text-gray-400 text-sm">Salvadoran Spanish</p>
        <div className="flex items-center justify-center gap-4 mt-3 text-xs text-gray-500">

          <span className="flex items-center gap-1">🔁 Spaced repetition</span>
          <span className="flex items-center gap-1">📖 Voseo</span>
        </div>
      </div>
      <button onClick={()=>setShowSettings(true)} className="absolute top-4 right-4 p-2 text-gray-500 hover:text-gray-300"><IconSettings size={20}/></button>
      <button onClick={()=>setScreen("sgHome")} className="w-full mb-5 p-4 rounded-xl border border-rose-800/60 bg-gradient-to-r from-rose-950/40 to-amber-950/30 hover:from-rose-950/60 hover:to-amber-950/50 transition-all flex items-center gap-3 text-left">
        <span className="text-2xl">🎤</span>
        <div className="flex-1">
          <div className="flex items-center gap-2"><span className="font-semibold text-sm text-rose-200">See &amp; Say</span><span className="text-[10px] px-1.5 py-0.5 bg-rose-900/50 text-rose-300 rounded-full">beta</span></div>
          <p className="text-gray-400 text-xs">See a picture, say the word — the app listens until you nail it.</p>
        </div>
        <IconChevronRight size={16} className="text-rose-400/70"/>
      </button>
      <div className="space-y-3">
        {getLoadedPacks().map(pack=>(
          <div key={pack.id} className="mb-5">

      </div>
      {showSettings&&<SettingsModal {...settingsProps} onClose={()=>setShowSettings(false)}/>}
    </div>
  );

  if(screen==="lesson") return (

        <div className="flex-1">
          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full transition-all duration-500" style={{width:`${progress}%`}}/></div>
          <div className="flex justify-between mt-1"><span className="text-xs text-gray-500">{selectedLesson?.title}</span><span className="text-xs text-gray-500">{currentIdx+1}/{sequence.length}</span></div>
        </div>
        <button onClick={()=>setShowSettings(true)} className="p-1.5 text-gray-500 hover:text-gray-300"><IconSettings size={16}/></button>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center p-6" {...(phase==="anticipate"?{onPointerDown:holdTimer,onPointerUp:releaseTimer,onPointerCancel:releaseTimer,onContextMenu:e=>e.preventDefault(),style:{touchAction:"none",userSelect:"none",WebkitUserSelect:"none",WebkitTouchCallout:"none"}}:{})}>
        {phase==="intro"&&selectedLesson?.dialogue&&(
          <div className="w-full max-w-md">
            <div className="text-center mb-6"><span className="text-4xl mb-3 block">{selectedLesson.icon}</span><h2 className="text-xl font-bold">{selectedLesson.title}</h2><p className="text-gray-400 text-sm mt-1">{selectedLesson.subtitle}</p></div>
            <div className="bg-gray-900 rounded-xl p-4 mb-4 border border-gray-800">
              <p className="text-xs text-gray-400 mb-3 italic">{selectedLesson.dialogue.context}</p>
              {selectedLesson.dialogue.lines.map((line,i)=>(
                <div key={i} className={`flex mb-2 ${line.speaker==="B"?"justify-end":""}`}>
                  <div className={`max-w-xs p-2.5 rounded-lg text-sm ${line.speaker==="A"?"bg-gray-800 text-gray-200":"bg-blue-900/50 text-blue-200"}`}>
                    <p className="font-medium">{line.textEs}</p><p className="text-xs opacity-60 mt-0.5">{line.textEn}</p>
                  </div>

            <p className="text-center text-gray-500 text-xs mb-4">You'll learn each phrase from this conversation</p>
            <button onClick={goToPrompt} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"><IconPlay size={18}/> Start Lesson</button>
          </div>

        {phase==="prompt"&&currentItem&&(
          <div className="w-full max-w-md text-center">

            :currentItem.type==="review"?<span className="inline-block px-2 py-0.5 bg-amber-900/30 border border-amber-800/50 text-amber-400 text-xs rounded-full mb-4"><IconRotate size={10} className="inline mr-1"/>Review</span>

        {phase==="anticipate"&&currentItem&&(

            <p className="text-gray-500 text-xs mb-4 uppercase tracking-wider">Think or say it aloud...</p>
            <h2 className="text-3xl font-bold text-white mb-8">{currentItem.promptEn}</h2>
            <div className="relative w-24 h-24 mx-auto mb-2 select-none pointer-events-none">
              <svg className="w-24 h-24" style={{transform:"rotate(-90deg)"}} viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" fill="none" stroke="#1f2937" strokeWidth="6"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke={isHolding?"#f59e0b":"#3b82f6"} strokeWidth="6" strokeLinecap="round" strokeDasharray={264} strokeDashoffset={0} style={{animation:`sgRingDeplete ${pauseDuration}s linear forwards`, animationPlayState: isHolding?"paused":"running"}}/>
              </svg>
              <span className={"absolute inset-0 flex items-center justify-center text-2xl font-bold "+(isHolding?"text-amber-400":"text-blue-400")}>{timer}</span>
            </div>
            <p className={"text-[11px] mb-4 h-4 select-none pointer-events-none transition-colors "+(isHolding?"text-amber-400":"text-gray-600")}>{isHolding?"⏸ Paused — release to resume":"Tap & hold anywhere to pause"}</p>
            <button onClick={skipToReveal} onPointerDown={e=>e.stopPropagation()} className="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-400 transition-colors flex items-center gap-2 mx-auto"><IconSkipFwd size={14}/> Show answer</button>
          </div>
        )}
        {phase==="reveal"&&currentItem&&(
          <div className="w-full max-w-md text-center">
            <p className="text-gray-500 text-xs mb-2">{currentItem.promptEn}</p>
            <h2 className="text-3xl font-bold text-emerald-400 mb-2">{currentItem.targetEs}</h2>
            {showPronunciation&&currentItem.pronunciation&&<p className="text-gray-500 text-sm mb-3 font-mono">/{currentItem.pronunciation}/</p>}
            {currentItem.standardEs&&<p className="text-xs text-gray-600 mb-2">Textbook Spanish: <span className="text-gray-400">{currentItem.standardEs}</span></p>}
            {currentItem.culturalNote&&<div className="bg-blue-950/30 border border-blue-900/40 rounded-lg p-2.5 mb-4 mx-auto max-w-xs"><p className="text-xs text-blue-300">{"🇸🇻"} {currentItem.culturalNote}</p></div>}
            <div className="flex items-center justify-center gap-3 mt-6">
              <button onClick={replayAudio} className="p-3 bg-gray-800 hover:bg-gray-700 rounded-full transition-colors" title="Replay"><IconVolume size={18} className="text-gray-300"/></button>
              <button onClick={nextItem} className="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors flex items-center gap-2">Continue <IconChevronRight size={16}/></button>
            </div>
          </div>
        )}
      </div>
      {showSettings&&<SettingsModal {...settingsProps} onClose={()=>setShowSettings(false)}/>}
    </div>
  );

  // COMPLETE
  if(screen==="complete"){
    const totalNew=sequence.filter(s=>s.type==="new").length;
    const totalReviews=sequence.filter(s=>s.type==="review").length;
    const ni=LESSONS.findIndex(l=>l.id===selectedLesson?.id)+1;
    const nextLesson=ni<LESSONS.length?LESSONS[ni]:null;
    return (
      <div className="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-6 max-w-lg mx-auto">
        <div className="text-center">
          <div className="text-6xl mb-4">{"🎉"}</div>
          <h2 className="text-2xl font-bold mb-1">{"¡Chivo!"}</h2>
          <p className="text-gray-400 mb-6">You completed {selectedLesson?.title}</p>
          <div className="bg-gray-900 rounded-xl p-4 mb-6 border border-gray-800 inline-block">
            <div className="grid grid-cols-2 gap-4 text-center">
              <div><p className="text-2xl font-bold text-blue-400">{totalNew}</p><p className="text-xs text-gray-500">New phrases</p></div>
              <div><p className="text-2xl font-bold text-amber-400">{totalReviews}</p><p className="text-xs text-gray-500">Reviews</p></div>
            </div>
          </div>
          <div className="space-y-3 w-full max-w-sm mx-auto">
            <button onClick={()=>startLesson(selectedLesson)} className="w-full py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm"><IconRotate size={16}/> Practice Again</button>
            {nextLesson&&<button onClick={()=>startLesson(nextLesson)} className="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2 text-sm leading-snug"><span className="min-w-0">Next: {nextLesson.title}</span><IconChevronRight size={16} className="shrink-0"/></button>}
            <button onClick={()=>setScreen("home")} className="w-full py-2 text-gray-500 hover:text-gray-300 text-sm transition-colors">Back to lessons</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<HablaGuanaca/>);

</script>
</body>
</html>
