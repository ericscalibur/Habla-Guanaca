const { useState, useEffect, useCallback, useRef } = React;

// ============================================================
// LESSON DATA
// ============================================================

// ============================================================
// PACK SYSTEM
// ============================================================
function getLoadedPacks() { return (window.HABLA_PACKS || []); }
function getAllLessons() {
  let all = [];
  getLoadedPacks().forEach(pack => { all = all.concat(pack.lessons || []); });
  return all;
}
const LESSONS = getAllLessons();

// ============================================================
// GIR SCHEDULING
// ============================================================
function buildLessonSequence(newItems) {
  const sequence = [], reviewQueue = [], intervals = [2,4,8,15];
  let position = 0;
  for (let i = 0; i < newItems.length; i++) {
    while (reviewQueue.length > 0 && reviewQueue[0].nextAt <= position) {
      const review = reviewQueue.shift();
      sequence.push({...review.item, type:"review", reviewNum:review.reviewNum});
      const nextIdx = intervals.indexOf(review.interval);
      if (nextIdx < intervals.length-1) {
        reviewQueue.push({item:review.item, interval:intervals[nextIdx+1], nextAt:position+intervals[nextIdx+1], reviewNum:review.reviewNum+1});
        reviewQueue.sort((a,b)=>a.nextAt-b.nextAt);
      }
      position++;
    }
    sequence.push({...newItems[i], type:"new"});
    position++;
    reviewQueue.push({item:newItems[i], interval:intervals[0], nextAt:position+intervals[0], reviewNum:1});
    reviewQueue.sort((a,b)=>a.nextAt-b.nextAt);
  }
  let extra=0;
  while (reviewQueue.length>0 && extra<10) {
    const review = reviewQueue.shift();
    sequence.push({...review.item, type:"review", reviewNum:review.reviewNum});
    extra++;
  }
  return sequence;
}

// ============================================================
// TTS
// ============================================================
function getSpanishVoices() {
  if (!window.speechSynthesis) return [];
  return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("es")).sort((a,b)=>{
    const sc=v=>{let s=0;const n=v.name.toLowerCase();if(n.includes("google"))s+=10;if(n.includes("neural")||n.includes("natural"))s+=10;if(n.includes("premium"))s+=8;if(n.includes("enhanced"))s+=5;if(n.includes("compact"))s-=10;if(v.lang==="es-419"||v.lang==="es-MX")s+=3;if(v.lang==="es-US")s+=2;return s;};
    return sc(b)-sc(a);
  });
}
function getEnglishVoices() {
  if (!window.speechSynthesis) return [];
  return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("en")).sort((a,b)=>{
    const sc=v=>{let s=0;const n=v.name.toLowerCase();if(n.includes("google"))s+=10;if(n.includes("neural")||n.includes("natural"))s+=10;if(n.includes("premium"))s+=8;if(n.includes("enhanced"))s+=5;if(n.includes("compact"))s-=10;if(v.lang==="en-US")s+=3;return s;};
    return sc(b)-sc(a);
  });
}
function speakWithVoice(text,voice,rate=0.85){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    if(voice){u.voice=voice;u.lang=voice.lang;}
    u.rate=rate;u.onend=resolve;u.onerror=resolve;
    window.speechSynthesis.speak(u);
  });
}

// ============================================================
// AUDIO BUNDLE SUPPORT — loads pre-rendered MP3s if available
// ============================================================
// Merge audio from all loaded packs + legacy bundle
let AUDIO_BUNDLE = {};
if (window.HABLA_AUDIO_BUNDLE) Object.assign(AUDIO_BUNDLE, window.HABLA_AUDIO_BUNDLE);
if (window.HABLA_PACKS) window.HABLA_PACKS.forEach(p => { if (p.audio) Object.assign(AUDIO_BUNDLE, p.audio); });
if (Object.keys(AUDIO_BUNDLE).length === 0) AUDIO_BUNDLE = null;

function playBundledAudio(itemId, lang) {
  return new Promise(resolve => {
    if (!AUDIO_BUNDLE || !AUDIO_BUNDLE[itemId] || !AUDIO_BUNDLE[itemId][lang]) { resolve(false); return; }
    const audio = new Audio(AUDIO_BUNDLE[itemId][lang]);
    audio.onended = () => resolve(true);
    audio.onerror = () => resolve(false);
    audio.play().catch(() => resolve(false));
  });
}

// ============================================================
// SETTINGS MODAL
// ============================================================
function SettingsModal({pauseDuration,setPauseDuration,speechRate,setSpeechRate,showPronunciation,setShowPronunciation,autoAdvance,setAutoAdvance,ttsEnabled,setTtsEnabled,spanishVoices,englishVoices,selectedSpanishVoice,setSelectedSpanishVoice,selectedEnglishVoice,setSelectedEnglishVoice,onClose}) {
  const preview=(voice,text)=>speakWithVoice(text,voice,0.85);
  return (
    <div className="fixed inset-0 bg-black/70 flex items-end sm:items-center justify-center z-50 p-4" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="bg-gray-900 rounded-2xl w-full max-w-sm border border-gray-800 overflow-hidden max-h-[85vh] flex flex-col">
        <div className="flex items-center justify-between p-4 border-b border-gray-800 shrink-0">
          <h3 className="font-semibold text-white">Settings</h3>
          <button onClick={onClose} className="p-1 text-gray-500 hover:text-gray-300"><IconX size={18}/></button>
        </div>
        <div className="p-4 space-y-5 overflow-y-auto">
          <div>
            <label className="text-sm text-gray-300 block mb-1.5">Spanish voice</label>
            <div className="space-y-1 max-h-36 overflow-y-auto">
              {spanishVoices.map((voice,i)=>(
                <button key={voice.name+i} onClick={()=>{setSelectedSpanishVoice(voice);preview(voice,"¿Cómo estás vos?");}}
                  className={`w-full text-left px-3 py-2 rounded-lg text-xs transition-colors flex items-center justify-between ${selectedSpanishVoice?.name===voice.name?"bg-blue-900/50 border border-blue-700 text-blue-200":"bg-gray-800 border border-gray-700 text-gray-300"}`}>
                  <div><span className="font-medium">{voice.name.replace(/Microsoft |Google |Apple /gi,"")}</span><span className="text-gray-500 ml-1.5">{voice.lang}</span></div>
                  {selectedSpanishVoice?.name===voice.name && <IconCheck size={12} className="text-blue-400"/>}
                </button>
              ))}
              {spanishVoices.length===0 && <p className="text-xs text-gray-500 italic">No Spanish voices found</p>}
            </div>
          </div>
          <div>
            <label className="text-sm text-gray-300 block mb-1.5">English voice</label>
            <div className="space-y-1 max-h-32 overflow-y-auto">
              {englishVoices.slice(0,8).map((voice,i)=>(
                <button key={voice.name+i} onClick={()=>{setSelectedEnglishVoice(voice);preview(voice,"How are you?");}}
                  className={`w-full text-left px-3 py-2 rounded-lg text-xs transition-colors flex items-center justify-between ${selectedEnglishVoice?.name===voice.name?"bg-blue-900/50 border border-blue-700 text-blue-200":"bg-gray-800 border border-gray-700 text-gray-300"}`}>
                  <div><span className="font-medium">{voice.name.replace(/Microsoft |Google |Apple /gi,"")}</span><span className="text-gray-500 ml-1.5">{voice.lang}</span></div>
                  {selectedEnglishVoice?.name===voice.name && <IconCheck size={12} className="text-blue-400"/>}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div className="flex justify-between mb-1.5"><label className="text-sm text-gray-300">Thinking time</label><span className="text-sm text-blue-400 font-mono">{pauseDuration}s</span></div>
            <input type="range" min="2" max="8" value={pauseDuration} onChange={e=>setPauseDuration(Number(e.target.value))} className="w-full accent-blue-500"/>
            <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>Quick</span><span>Relaxed</span></div>
          </div>
          <div>
            <div className="flex justify-between mb-1.5"><label className="text-sm text-gray-300">Speech speed</label><span className="text-sm text-blue-400 font-mono">{speechRate}x</span></div>
            <input type="range" min="0.5" max="1.2" step="0.05" value={speechRate} onChange={e=>setSpeechRate(Number(e.target.value))} className="w-full accent-blue-500"/>
            <div className="flex justify-between text-xs text-gray-600 mt-0.5"><span>Slow</span><span>Natural</span></div>
          </div>
          <div className="space-y-3">
            {[["Pronunciation guide",showPronunciation,setShowPronunciation],["Auto-advance",autoAdvance,setAutoAdvance],["Text-to-speech",ttsEnabled,setTtsEnabled]].map(([label,checked,onChange])=>(
              <div key={label} className="flex items-center justify-between">
                <span className="text-sm text-gray-300">{label}</span>
                <button onClick={()=>onChange(!checked)} className={`w-10 h-5 rounded-full transition-colors relative ${checked?"bg-blue-600":"bg-gray-700"}`}>
                  <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-transform ${checked?"left-5":"left-0.5"}`}/>
                </button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function HablaGuanaca() {
  const [screen,setScreen]=useState("home");
  const [selectedLesson,setSelectedLesson]=useState(null);
  const [completedLessons,setCompletedLessons]=useState({});
  const [sequence,setSequence]=useState([]);
  const [currentIdx,setCurrentIdx]=useState(0);
  const [phase,setPhase]=useState("intro");
  const [showSettings,setShowSettings]=useState(false);
  const [pauseDuration,setPauseDuration]=useState(4);
  const [speechRate,setSpeechRate]=useState(0.85);
  const [showPronunciation,setShowPronunciation]=useState(true);
  const [autoAdvance,setAutoAdvance]=useState(true);
  const [ttsEnabled,setTtsEnabled]=useState(true);
  const [spanishVoices,setSpanishVoices]=useState([]);
  const [englishVoices,setEnglishVoices]=useState([]);
  const [selectedSpanishVoice,setSelectedSpanishVoice]=useState(null);
  const [selectedEnglishVoice,setSelectedEnglishVoice]=useState(null);
  const [timer,setTimer]=useState(0);
  const timerRef=useRef(null);
  const isMountedRef=useRef(true);

  useEffect(()=>{
    const loadVoices=()=>{
      const es=getSpanishVoices(),en=getEnglishVoices();
      if(es.length>0){setSpanishVoices(es);setSelectedSpanishVoice(p=>p||es[0]);}
      if(en.length>0){setEnglishVoices(en);setSelectedEnglishVoice(p=>p||en[0]);}
    };
    if(window.speechSynthesis){loadVoices();window.speechSynthesis.onvoiceschanged=loadVoices;}
    return()=>{isMountedRef.current=false;if(window.speechSynthesis)window.speechSynthesis.cancel();if(timerRef.current)clearInterval(timerRef.current);};
  },[]);

  const speakEs=useCallback(async(text,itemId)=>{
    if(!ttsEnabled)return;
    if(AUDIO_BUNDLE && itemId){const ok=await playBundledAudio(itemId,"es");if(ok)return;}
    await speakWithVoice(text,selectedSpanishVoice,speechRate);
  },[ttsEnabled,selectedSpanishVoice,speechRate]);

  const speakEn=useCallback(async(text,itemId)=>{
    if(!ttsEnabled)return;
    if(AUDIO_BUNDLE && itemId){const ok=await playBundledAudio(itemId,"en");if(ok)return;}
    await speakWithVoice(text,selectedEnglishVoice,speechRate);
  },[ttsEnabled,selectedEnglishVoice,speechRate]);

  const startLesson=useCallback(lesson=>{
    setSelectedLesson(lesson);setSequence(buildLessonSequence(lesson.newItems));setCurrentIdx(0);setPhase("intro");setScreen("lesson");
  },[]);

  const goToPrompt=useCallback(async()=>{
    setPhase("prompt");
    const item=sequence[currentIdx];
    if(item)await speakEn(item.promptEn,item.id);
    if(autoAdvance&&isMountedRef.current)setTimeout(()=>{if(isMountedRef.current)setPhase("anticipate");},800);
  },[sequence,currentIdx,speakEn,autoAdvance]);

  useEffect(()=>{
    if(phase==="anticipate"){
      setTimer(pauseDuration);
      timerRef.current=setInterval(()=>{setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setPhase("reveal");return 0;}return t-1;});},1000);
    }
    return()=>{if(timerRef.current)clearInterval(timerRef.current);};
  },[phase,pauseDuration]);

  useEffect(()=>{
    if(phase==="reveal"){const item=sequence[currentIdx];if(item)speakEs(item.targetEs,item.id);}
  },[phase]);

  const nextItem=useCallback(()=>{
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    if(currentIdx+1>=sequence.length){setCompletedLessons(p=>({...p,[selectedLesson.id]:true}));setScreen("complete");}
    else{
      const nextI=currentIdx+1;setCurrentIdx(nextI);setPhase("prompt");
      setTimeout(async()=>{
        const nd=sequence[nextI];
        if(nd)await speakEn(nd.promptEn,nd.id);
        if(autoAdvance&&isMountedRef.current)setTimeout(()=>{if(isMountedRef.current)setPhase("anticipate");},800);
      },300);
    }
  },[currentIdx,sequence,selectedLesson,speakEn,autoAdvance]);

  const skipToReveal=useCallback(()=>{if(timerRef.current)clearInterval(timerRef.current);setTimer(0);setPhase("reveal");},[]);

  const replayAudio=useCallback(()=>{
    const item=sequence[currentIdx];if(!item||!ttsEnabled)return;
    if(phase==="prompt")speakEn(item.promptEn,item.id);else speakEs(item.targetEs,item.id);
  },[sequence,currentIdx,phase,ttsEnabled,speakEn,speakEs]);

  const currentItem=sequence[currentIdx]||null;
  const progress=sequence.length>0?((currentIdx+1)/sequence.length)*100:0;

  const settingsProps={pauseDuration,setPauseDuration,speechRate,setSpeechRate,showPronunciation,setShowPronunciation,autoAdvance,setAutoAdvance,ttsEnabled,setTtsEnabled,spanishVoices,englishVoices,selectedSpanishVoice,setSelectedSpanishVoice,selectedEnglishVoice,setSelectedEnglishVoice};

  // HOME
  if(screen==="home") return (
    <div className="min-h-screen bg-gray-950 text-white p-4 max-w-lg mx-auto relative">
      <div className="text-center mb-8 pt-4">
        <h1 className="text-3xl font-bold mb-1"><span className="text-blue-400">Habla</span>{" "}<span className="text-emerald-400">Guanaca</span></h1>
        <p className="text-gray-400 text-sm">Salvadoran Spanish</p>
        <div className="flex items-center justify-center gap-4 mt-3 text-xs text-gray-500">
          <span className="flex items-center gap-1">🎧 Audio-first</span>
          <span className="flex items-center gap-1">🔁 Spaced repetition</span>
          <span className="flex items-center gap-1">📖 Voseo</span>
        </div>
      </div>
      <button onClick={()=>setShowSettings(true)} className="absolute top-4 right-4 p-2 text-gray-500 hover:text-gray-300"><IconSettings size={20}/></button>
      <div className="space-y-3">
        {getLoadedPacks().map(pack=>(
          <div key={pack.id} className="mb-5">
            <div className="flex items-center gap-2 mb-2 px-1">
              <span className="text-lg">{pack.icon}</span>
              <h2 className="text-sm font-semibold text-gray-300">{pack.name}</h2>
              <span className="text-xs text-gray-600">{pack.lessons.length} lessons</span>
            </div>
            <p className="text-xs text-gray-500 mb-2 px-1">{pack.description}</p>
            <div className="space-y-2">
              {pack.lessons.map((lesson,idx)=>{
                const done=completedLessons[lesson.id];
                const gi=LESSONS.indexOf(lesson);
                const locked=gi>1&&!completedLessons[LESSONS[gi-1]?.id];
                return (
                  <button key={lesson.id} onClick={()=>!locked&&startLesson(lesson)} disabled={locked}
                    className={`w-full text-left p-4 rounded-xl border transition-all ${locked?"border-gray-800 bg-gray-900/50 opacity-50 cursor-not-allowed":done?"border-emerald-800 bg-emerald-950/30 hover:bg-emerald-950/50":"border-gray-800 bg-gray-900 hover:bg-gray-800 hover:border-gray-700"}`}>
                    <div className="flex items-center gap-3">
                      <span className="text-2xl">{lesson.icon}</span>
                      <div className="flex-1">
                        <div className="flex items-center gap-2"><span className="font-semibold text-sm">{lesson.title}</span>{done&&<IconCheck size={14} className="text-emerald-400"/>}</div>
                        <p className="text-gray-400 text-xs">{lesson.subtitle}</p>
                        <p className="text-gray-500 text-xs mt-0.5">{lesson.description}</p>
                      </div>
                      <div className="text-right">
                        <span className="text-gray-600 text-xs flex items-center gap-1"><IconClock size={10}/> {lesson.estimatedMinutes}m</span>
                        {!locked&&<IconChevronRight size={16} className="text-gray-600 mt-1 ml-auto"/>}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div className="mt-6 p-3 bg-blue-950/30 border border-blue-900/50 rounded-lg">
        <p className="text-xs text-blue-300 font-semibold mb-1">🇸🇻 Why Salvadoran Spanish?</p>
        <p className="text-xs text-gray-400 leading-relaxed">Salvadorans use <span className="text-blue-300 font-medium">vos</span> instead of tú. You'll say "vos sos" not "tú eres," and "¿cómo estás vos?" not "¿cómo estás tú?" Plus local slang called <span className="text-emerald-300 font-medium">caliche</span> that you won't find in textbooks.</p>
      </div>
      {showSettings&&<SettingsModal {...settingsProps} onClose={()=>setShowSettings(false)}/>}
    </div>
  );

  // LESSON
  if(screen==="lesson") return (
    <div className="min-h-screen bg-gray-950 text-white flex flex-col max-w-lg mx-auto">
      <div className="p-3 flex items-center gap-3">
        <button onClick={()=>{if(window.speechSynthesis)window.speechSynthesis.cancel();setScreen("home");}} className="p-1.5 text-gray-500 hover:text-gray-300"><IconChevronLeft size={20}/></button>
        <div className="flex-1">
          <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-blue-500 to-emerald-500 rounded-full transition-all duration-500" style={{width:`${progress}%`}}/></div>
          <div className="flex justify-between mt-1"><span className="text-xs text-gray-500">{selectedLesson?.title}</span><span className="text-xs text-gray-500">{currentIdx+1}/{sequence.length}</span></div>
        </div>
        <button onClick={()=>setShowSettings(true)} className="p-1.5 text-gray-500 hover:text-gray-300"><IconSettings size={16}/></button>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center p-6">
        {phase==="intro"&&selectedLesson?.dialogue&&(
          <div className="w-full max-w-md">
            <div className="text-center mb-6"><span className="text-4xl mb-3 block">{selectedLesson.icon}</span><h2 className="text-xl font-bold">{selectedLesson.title}</h2><p className="text-gray-400 text-sm mt-1">{selectedLesson.subtitle}</p></div>
            <div className="bg-gray-900 rounded-xl p-4 mb-4 border border-gray-800">
              <p className="text-xs text-gray-400 mb-3 italic">{selectedLesson.dialogue.context}</p>
              {selectedLesson.dialogue.lines.map((line,i)=>(
                <div key={i} className={`flex mb-2 ${line.speaker==="B"?"justify-end":""}`}>
                  <div className={`max-w-xs p-2.5 rounded-lg text-sm ${line.speaker==="A"?"bg-gray-800 text-gray-200":"bg-blue-900/50 text-blue-200"}`}>
                    <p className="font-medium">{line.textEs}</p><p className="text-xs opacity-60 mt-0.5">{line.textEn}</p>
                  </div>
                </div>
              ))}
            </div>
            <p className="text-center text-gray-500 text-xs mb-4">You'll learn each phrase from this conversation</p>
            <button onClick={goToPrompt} className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2"><IconPlay size={18}/> Start Lesson</button>
          </div>
        )}
        {phase==="prompt"&&currentItem&&(
          <div className="w-full max-w-md text-center">
            {currentItem.type==="review"?<span className="inline-block px-2 py-0.5 bg-amber-900/30 border border-amber-800/50 text-amber-400 text-xs rounded-full mb-4"><IconRotate size={10} className="inline mr-1"/>Review</span>
            :<span className="inline-block px-2 py-0.5 bg-blue-900/30 border border-blue-800/50 text-blue-400 text-xs rounded-full mb-4"><IconStar size={10} className="inline mr-1"/>New</span>}
            <p className="text-gray-400 text-sm mb-2">How do you say:</p>
            <h2 className="text-3xl font-bold text-white mb-6">{currentItem.promptEn}</h2>
            {!autoAdvance&&<button onClick={()=>setPhase("anticipate")} className="mt-4 px-6 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-300">I'm ready →</button>}
          </div>
        )}
        {phase==="anticipate"&&currentItem&&(
          <div className="w-full max-w-md text-center">
            <p className="text-gray-500 text-xs mb-4 uppercase tracking-wider">Think or say it aloud...</p>
            <h2 className="text-3xl font-bold text-white mb-8">{currentItem.promptEn}</h2>
            <div className="relative w-24 h-24 mx-auto mb-6">
              <svg className="w-24 h-24" style={{transform:"rotate(-90deg)"}} viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="42" fill="none" stroke="#1f2937" strokeWidth="6"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" strokeDasharray={264} strokeDashoffset={264-(264*timer)/pauseDuration} style={{transition:"stroke-dashoffset 1s linear"}}/>
              </svg>
              <span className="absolute inset-0 flex items-center justify-center text-2xl font-bold text-blue-400">{timer}</span>
            </div>
            <button onClick={skipToReveal} className="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm text-gray-400 transition-colors flex items-center gap-2 mx-auto"><IconSkipFwd size={14}/> Show answer</button>
          </div>
        )}
        {phase==="reveal"&&currentItem&&(
          <div className="w-full max-w-md text-center">
            <p className="text-gray-500 text-xs mb-2">{currentItem.promptEn}</p>
            <h2 className="text-3xl font-bold text-emerald-400 mb-2">{currentItem.targetEs}</h2>
            {showPronunciation&&currentItem.pronunciation&&<p className="text-gray-500 text-sm mb-3 font-mono">/{currentItem.pronunciation}/</p>}
            {currentItem.standardEs&&<p className="text-xs text-gray-600 mb-2">Textbook Spanish: <span className="text-gray-400">{currentItem.standardEs}</span></p>}
            {currentItem.culturalNote&&<div className="bg-blue-950/30 border border-blue-900/40 rounded-lg p-2.5 mb-4 mx-auto max-w-xs"><p className="text-xs text-blue-300">{"🇸🇻"} {currentItem.culturalNote}</p></div>}
            <div className="flex items-center justify-center gap-3 mt-6">
              <button onClick={replayAudio} className="p-3 bg-gray-800 hover:bg-gray-700 rounded-full transition-colors" title="Replay"><IconVolume size={18} className="text-gray-300"/></button>
              <button onClick={nextItem} className="px-8 py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors flex items-center gap-2">Continue <IconChevronRight size={16}/></button>
            </div>
          </div>
        )}
      </div>
      {showSettings&&<SettingsModal {...settingsProps} onClose={()=>setShowSettings(false)}/>}
    </div>
  );

  // COMPLETE
  if(screen==="complete"){
    const totalNew=sequence.filter(s=>s.type==="new").length;
    const totalReviews=sequence.filter(s=>s.type==="review").length;
    const ni=LESSONS.findIndex(l=>l.id===selectedLesson?.id)+1;
    const nextLesson=ni<LESSONS.length?LESSONS[ni]:null;
    return (
      <div className="min-h-screen bg-gray-950 text-white flex flex-col items-center justify-center p-6 max-w-lg mx-auto">
        <div className="text-center">
          <div className="text-6xl mb-4">{"🎉"}</div>
          <h2 className="text-2xl font-bold mb-1">{"¡Chivo!"}</h2>
          <p className="text-gray-400 mb-6">You completed {selectedLesson?.title}</p>
          <div className="bg-gray-900 rounded-xl p-4 mb-6 border border-gray-800 inline-block">
            <div className="grid grid-cols-2 gap-4 text-center">
              <div><p className="text-2xl font-bold text-blue-400">{totalNew}</p><p className="text-xs text-gray-500">New phrases</p></div>
              <div><p className="text-2xl font-bold text-amber-400">{totalReviews}</p><p className="text-xs text-gray-500">Reviews</p></div>
            </div>
          </div>
          <div className="space-y-3 w-full max-w-xs mx-auto">
            <button onClick={()=>startLesson(selectedLesson)} className="w-full py-3 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm"><IconRotate size={16}/> Practice Again</button>
            {nextLesson&&<button onClick={()=>startLesson(nextLesson)} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">Next: {nextLesson.title} <IconChevronRight size={16}/></button>}
            <button onClick={()=>setScreen("home")} className="w-full py-2 text-gray-500 hover:text-gray-300 text-sm transition-colors">Back to lessons</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<HablaGuanaca/>);

</script>
</body>
</html>
