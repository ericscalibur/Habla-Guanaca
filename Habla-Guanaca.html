/* -------------------------------------------------------------------------
   2. GIR SCHEDULING  (compressed in-lesson Pimsleur schedule)
   Interleaves new items with reviews at expanding gaps: 2 → 5 → 12 → 25.
   ------------------------------------------------------------------------- */

const GIR_SCHEDULE = [2, 5, 12, 25];

function expandInterval(current) {
  const idx = GIR_SCHEDULE.indexOf(current);
  return idx < GIR_SCHEDULE.length - 1 ? GIR_SCHEDULE[idx + 1] : 25;
}

function buildLessonSequence(newItems) {
  const sequence = [];
  let reviewQueue = []; // { item, interval, nextAt, reviews }
  let position = 0;

  const sortQueue = () => reviewQueue.sort((a, b) => a.nextAt - b.nextAt);

  for (const item of newItems) {
    // Insert any reviews due at or before this position.
    while (reviewQueue.length > 0 && reviewQueue[0].nextAt <= position) {
      const review = reviewQueue.shift();
      sequence.push({ ...review.item, type: "review", reviewNum: review.reviews + 1 });
      const nextInterval = expandInterval(review.interval);
      reviewQueue.push({
        item: review.item,
        interval: nextInterval,
        nextAt: position + nextInterval,
        reviews: review.reviews + 1,
      });
      sortQueue();
      position++;
    }

    // Introduce the new item.
    sequence.push({ ...item, type: "new" });
    position++;

    // Schedule its first review (2 items later).
    reviewQueue.push({ item, interval: 2, nextAt: position + 2, reviews: 0 });
    sortQueue();
  }

  // Drain remaining reviews into an end-of-lesson review block.
  sortQueue();
  while (reviewQueue.length > 0) {
    const review = reviewQueue.shift();
    sequence.push({ ...review.item, type: "review", reviewNum: review.reviews + 1, endReview: true });
  }

  return sequence;
}

/* -------------------------------------------------------------------------
   3. SPEECH  (Web Speech API with language fallback)
   ------------------------------------------------------------------------- */

// Base quality score: prefer neural/premium voices, penalize "compact".
function baseVoiceScore(v) {
  let s = 0;
  const name = (v.name || "").toLowerCase();
  if (name.includes("google")) s += 10;
  if (name.includes("neural") || name.includes("natural")) s += 10;
  if (name.includes("premium")) s += 8;
  if (name.includes("enhanced")) s += 5;
  if (name.includes("compact")) s -= 10;
  return s;
}

function scoreSpanish(v) {
  let s = baseVoiceScore(v);
  const lang = (v.lang || "").toLowerCase();
  if (lang === "es-sv") s += 6; // Salvadoran, if it ever exists
  if (lang === "es-419" || lang === "es-mx") s += 3; // Latin American proxies
  if (lang === "es-us") s += 2;
  return s;
}

function scoreEnglish(v) {
  let s = baseVoiceScore(v);
  if ((v.lang || "").toLowerCase().startsWith("en-us")) s += 3;
  return s;
}

// Speak a string with a specific voice. Returns a Promise that resolves
// when speech ends (with a safety-net timeout in case onend never fires).
function speakWithVoice(text, voice, rate = 0.85, fallbackLang) {
  return new Promise((resolve) => {
    if (typeof window === "undefined" || !window.speechSynthesis) {
      resolve();
      return;
    }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (voice) {
      u.voice = voice;
      u.lang = voice.lang;
    } else if (fallbackLang) {
      u.lang = fallbackLang;
    }
    u.rate = rate;
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      resolve();
    };
    u.onend = finish;
    u.onerror = finish;
    window.speechSynthesis.speak(u);
    setTimeout(finish, Math.max(1500, text.length * 90 + 1200));
  });
}

// Loads ALL installed Spanish + English voices (sorted by quality) and keeps
// the lists fresh via the async `onvoiceschanged` event.
function useVoices() {
  const [spanishVoices, setSpanishVoices] = useState([]);
  const [englishVoices, setEnglishVoices] = useState([]);
  const [supported, setSupported] = useState(true);

  useEffect(() => {
    if (typeof window === "undefined" || !window.speechSynthesis) {
      setSupported(false);
      return;
    }
    const load = () => {
      const all = window.speechSynthesis.getVoices();
      if (!all || !all.length) return;
      const es = all
        .filter((v) => (v.lang || "").toLowerCase().startsWith("es"))
        .sort((a, b) => scoreSpanish(b) - scoreSpanish(a));
      const en = all
        .filter((v) => (v.lang || "").toLowerCase().startsWith("en"))
        .sort((a, b) => scoreEnglish(b) - scoreEnglish(a));
      setSpanishVoices(es);
      setEnglishVoices(en);
    };
    load();
    // Browsers populate voices asynchronously — re-load when ready.
    window.speechSynthesis.onvoiceschanged = load;
    const t = setTimeout(load, 400);
    return () => {
      clearTimeout(t);
      if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = null;
    };
  }, []);

  return { spanishVoices, englishVoices, supported };
}

/* -------------------------------------------------------------------------
   4. SMALL UI HELPERS

function Pill({ children, color = "#1f2937", text = "#cbd5e1" }) {
  return (
    <span
      className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold tracking-wide"
      style={{ backgroundColor: color, color: text }}
    >
      {children}
    </span>
  );
}

function ProgressBar({ sequence, index }) {
  return (
    <div className="w-full">
      <div className="flex gap-1 w-full">
        {sequence.map((item, i) => {
          const done = i < index;
          const current = i === index;
          const isReview = item.type === "review";
          let bg = "#27303f";
          if (done) bg = isReview ? SV_BLUE_SOFT : SV_BLUE;
          if (current) bg = "#facc15";
          return (
            <div
              key={i}
              className="h-1.5 flex-1 rounded-full transition-all duration-300"
              style={{ backgroundColor: bg, opacity: current ? 1 : done ? 0.95 : 0.5 }}
              title={`${item.id} · ${item.type}`}
            />
          );
        })}
      </div>
      <div className="flex justify-between mt-2 text-xs text-slate-400">
        <span>
          Item {Math.min(index + 1, sequence.length)} of {sequence.length}
        </span>
        <span className="flex items-center gap-3">
          <span className="flex items-center gap-1">
            <span className="inline-block w-2 h-2 rounded-full" style={{ backgroundColor: SV_BLUE }} /> new
          </span>
          <span className="flex items-center gap-1">
            <span className="inline-block w-2 h-2 rounded-full" style={{ backgroundColor: SV_BLUE_SOFT }} /> review
          </span>
        </span>
      </div>
    </div>
  );
}

/* -------------------------------------------------------------------------
   7. LESSON ENGINE (the state machine)
   phases: intro → (prompt → anticipation → reveal)* → done
   ------------------------------------------------------------------------- */

const PHASE = {
  INTRO: "intro",
  PROMPT: "prompt",
  ANTICIPATION: "anticipation",
  REVEAL: "reveal",
};

function LessonEngine({ lesson, settings, esVoice, enVoice, onExit, onComplete }) {
  const sequence = useMemo(() => buildLessonSequence(lesson.items), [lesson]);

  const [index, setIndex] = useState(0);
  const [phase, setPhase] = useState(PHASE.INTRO);
  const [countdown, setCountdown] = useState(settings.pause);
  const [peek, setPeek] = useState(false);
  const [speaking, setSpeaking] = useState(false);

  const timersRef = useRef([]);
  const startRef = useRef(0);

  const current = sequence[index];

  // ---- speech helpers --------------------------------------------------
  const cancelSpeech = useCallback(() => {
    if (typeof window !== "undefined" && window.speechSynthesis) window.speechSynthesis.cancel();
  }, []);

  const clearTimers = useCallback(() => {
    timersRef.current.forEach((t) => clearTimeout(t));
    timersRef.current = [];
  }, []);

  const addTimer = useCallback((fn, ms) => {
    const t = setTimeout(fn, ms);
    timersRef.current.push(t);
    return t;
  }, []);

  const speak = useCallback(
    (text, kind) =>
      new Promise((resolve) => {
        if (
          !settings.ttsEnabled ||
          typeof window === "undefined" ||
          !window.speechSynthesis
        ) {
          resolve();
          return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const voice = kind === "es" ? esVoice : enVoice;
        if (voice) {
          u.voice = voice;
          u.lang = voice.lang;
        } else {
          u.lang = kind === "es" ? "es-419" : "en-US";
        }
        u.rate = kind === "es" ? settings.rate : Math.min(1, settings.rate + 0.1);
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          resolve();
        };
        u.onend = finish;
        u.onerror = finish;
        setSpeaking(true);
        window.speechSynthesis.speak(u);
        // Safety net: resolve even if onend never fires.
        addTimer(finish, Math.max(1500, text.length * 90 + 1200));
      }).then(() => setSpeaking(false)),
    [esVoice, enVoice, settings.rate, settings.ttsEnabled, addTimer]
  );

  // ---- phase orchestration --------------------------------------------
  const goToReveal = useCallback(() => {
    clearTimers();
    setPhase(PHASE.REVEAL);
  }, [clearTimers]);

  const advance = useCallback(() => {
    clearTimers();
    cancelSpeech();
    setPeek(false);
    if (index + 1 >= sequence.length) {
      onComplete(sequence);
    } else {
      setIndex((i) => i + 1);
      setPhase(PHASE.PROMPT);
    }
  }, [clearTimers, cancelSpeech, index, sequence, onComplete]);

  const startItem = useCallback(() => {
    setPhase(PHASE.PROMPT);
  }, []);

  // Drive each phase with effects keyed on (phase, index).
  useEffect(() => {
    if (phase === PHASE.PROMPT && current) {
      let cancelled = false;
      speak(current.promptEn, "en").then(() => {
        if (!cancelled) addTimer(() => setPhase(PHASE.ANTICIPATION), 200);
      });
      return () => {
        cancelled = true;
      };
    }
  }, [phase, index]); // eslint-disable-line

  useEffect(() => {
    if (phase === PHASE.ANTICIPATION) {
      setCountdown(settings.pause);
      startRef.current = Date.now();
      const tick = () => {
        const elapsed = (Date.now() - startRef.current) / 1000;
        const remaining = Math.max(0, settings.pause - elapsed);
        setCountdown(remaining);
        if (remaining <= 0) {
          goToReveal();
        } else {
          addTimer(tick, 100);
        }
      };
      addTimer(tick, 100);
      return () => clearTimers();
    }
  }, [phase, index]); // eslint-disable-line

  useEffect(() => {
    if (phase === PHASE.REVEAL && current) {
      let cancelled = false;
      speak(current.targetEs, "es").then(() => {
        if (!cancelled && settings.autoAdvance) {
          addTimer(advance, 1400);
        }
      });
      return () => {
        cancelled = true;
      };
    }
  }, [phase, index]); // eslint-disable-line

  // Cleanup on unmount.
  useEffect(() => {
    return () => {
      clearTimers();
      cancelSpeech();
    };
  }, [clearTimers, cancelSpeech]);

  const repeat = useCallback(() => {
    if (phase === PHASE.REVEAL) speak(current.targetEs, "es");
    else speak(current.promptEn, "en");
  }, [phase, current, speak]);

  const skipPause = useCallback(() => {
    if (phase === PHASE.ANTICIPATION) goToReveal();
  }, [phase, goToReveal]);

  // ---- INTRO screen ----------------------------------------------------
  if (phase === PHASE.INTRO) {
    return (
      <div className="max-w-2xl mx-auto px-5 py-8">
        <button
          onClick={onExit}
          className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm mb-8 transition-colors"
        >
          <Home size={16} /> All lessons
        </button>

        <div className="rounded-3xl bg-slate-800/70 border border-slate-700 p-7">
          <Pill color="#0b2a5b" text="#9dc0ff">
            <Sparkles size={12} /> Lesson {lesson.id.replace("L0", "")}
          </Pill>
          <h1 className="text-3xl font-extrabold text-white mt-4">{lesson.title}</h1>
          <p className="text-lg font-semibold mb-1" style={{ color: SV_BLUE_SOFT }}>
            {lesson.subtitle}
          </p>
          <p className="text-slate-300 leading-relaxed mt-3">{lesson.description}</p>

          {lesson.dialogue && (
            <div className="mt-6 rounded-2xl bg-slate-900/70 border border-slate-700 p-4">
              <p className="text-xs font-semibold text-slate-400 flex items-center gap-1.5 mb-3">
                <MessageCircle size={13} /> {lesson.dialogue.context}
              </p>
              <div className="space-y-2.5">
                {lesson.dialogue.lines.map((line, i) => (
                  <div key={i} className="flex gap-2.5">
                    <span
                      className="shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white"
                      style={{ backgroundColor: line.speaker === "A" ? SV_BLUE : SV_BLUE_SOFT }}
                    >
                      {line.speaker}
                    </span>
                    <div>
                      <p className="text-white font-medium leading-snug">{line.textEs}</p>
                      <p className="text-slate-500 text-sm leading-snug">{line.textEn}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex items-center gap-4 mt-6 text-sm text-slate-400">
            <span className="flex items-center gap-1.5">
              <Clock size={14} /> ~{lesson.estimatedMinutes} min
            </span>
            <span className="flex items-center gap-1.5">
              <Sparkles size={14} /> {lesson.items.length} new · {sequence.length - lesson.items.length} reviews
            </span>
          </div>
        </div>

        <button
          onClick={startItem}
          className="w-full mt-6 py-4 rounded-2xl font-bold text-white text-lg flex items-center justify-center gap-2 transition-transform active:scale-[0.99]"
          style={{ backgroundColor: SV_BLUE }}
        >
          <Play size={20} /> Start lesson
        </button>
        <p className="text-center text-xs text-slate-500 mt-3">
          Listen, then answer out loud during the pause — say it before the reveal.
        </p>
      </div>
    );
  }

  // ---- PRACTICE screen (prompt / anticipation / reveal) ----------------
  const isReview = current?.type === "review";
  const showSpanish = phase === PHASE.REVEAL && (settings.showText || peek);

  return (
    <div className="max-w-2xl mx-auto px-5 py-6 min-h-[80vh] flex flex-col">
      {/* Top bar */}
      <div className="flex items-center justify-between mb-4">
        <button
          onClick={onExit}
          className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm transition-colors"
        >
          <Home size={16} /> Exit
        </button>
        <span className="text-sm font-semibold text-slate-300">{lesson.title}</span>
      </div>

      <ProgressBar sequence={sequence} index={index} />

      {/* Phase + item meta */}
      <div className="flex items-center gap-2 mt-6 mb-2">
        {isReview ? (
          <Pill color="#13315c" text="#9dc0ff">
            <Repeat size={12} /> Review{current.reviewNum ? ` #${current.reviewNum}` : ""}
          </Pill>
        ) : (
          <Pill color="#0b2a5b" text="#9dc0ff">
            <Sparkles size={12} /> New word
          </Pill>
        )}
        {current.endReview && (
          <Pill color="#3b0764" text="#e9d5ff">
            End-of-lesson recall
          </Pill>
        )}
        <span className="ml-auto text-xs text-slate-500">{current.id}</span>
      </div>

      {/* Card */}
      <div className="flex-1 flex flex-col">
        <div
          onClick={() => {
            if (phase === PHASE.ANTICIPATION) skipPause();
            else if (phase === PHASE.REVEAL) advance();
          }}
          className="flex-1 rounded-3xl bg-slate-800/70 border border-slate-700 p-7 flex flex-col items-center justify-center text-center cursor-pointer select-none transition-colors hover:border-slate-600"
        >
          {/* English prompt — always visible from prompt phase on */}
          <p className="text-xs uppercase tracking-widest text-slate-500 mb-2">Say in Salvadoran Spanish</p>
          <p className="text-2xl sm:text-3xl font-bold text-white leading-snug">{current.promptEn}</p>

          {/* Anticipation timer */}
          {phase === PHASE.ANTICIPATION && (
            <div className="mt-8 flex flex-col items-center">
              <div className="relative w-24 h-24">
                <svg className="w-24 h-24 -rotate-90" viewBox="0 0 100 100">
                  <circle cx="50" cy="50" r="44" fill="none" stroke="#334155" strokeWidth="8" />
                  <circle
                    cx="50"
                    cy="50"
                    r="44"
                    fill="none"
                    stroke={SV_BLUE_SOFT}
                    strokeWidth="8"
                    strokeLinecap="round"
                    strokeDasharray={2 * Math.PI * 44}
                    strokeDashoffset={2 * Math.PI * 44 * (1 - countdown / settings.pause)}
                    style={{ transition: "stroke-dashoffset 0.1s linear" }}
                  />
                </svg>
                <span className="absolute inset-0 flex items-center justify-center text-2xl font-extrabold text-white">
                  {Math.ceil(countdown)}
                </span>
              </div>
              <p className="text-slate-400 text-sm mt-4 animate-pulse">Answer out loud now…</p>
              <p className="text-slate-600 text-xs mt-1">tap to skip</p>
            </div>
          )}

          {/* Prompt phase: listening indicator */}
          {phase === PHASE.PROMPT && (
            <div className="mt-8 flex items-center gap-2 text-slate-400">
              <Volume2 size={18} className={speaking ? "animate-pulse" : ""} />
              <span className="text-sm">Listen…</span>
            </div>
          )}

          {/* Reveal */}
          {phase === PHASE.REVEAL && (
            <div className="mt-7 w-full">
              <div className="h-px w-full bg-slate-700 mb-6" />
              {showSpanish ? (
                <>
                  <p className="text-3xl sm:text-4xl font-extrabold leading-tight" style={{ color: SV_BLUE_SOFT }}>
                    {current.targetEs}
                  </p>
                  {current.pron && (
                    <p className="text-slate-400 mt-2 text-lg font-light italic">[{current.pron}]</p>
                  )}
                  {current.standardEs && (
                    <p className="text-slate-500 text-sm mt-3">
                      Textbook Spanish: <span className="text-slate-400">{current.standardEs}</span>
                    </p>
                  )}
                  {current.note && (
                    <div className="mt-4 mx-auto max-w-sm rounded-xl bg-slate-900/70 border border-slate-700 px-4 py-3">
                      <p className="text-sm text-slate-300 leading-snug flex items-start gap-2">
                        <Sparkles size={14} className="mt-0.5 shrink-0" style={{ color: SV_BLUE_SOFT }} />
                        {current.note}
                      </p>
                    </div>
                  )}
                </>
              ) : (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setPeek(true);
                  }}
                  className="mx-auto flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 text-slate-200 text-sm font-semibold"
                >
                  <Eye size={16} /> Tap to reveal text
                </button>
              )}
              <p className="text-slate-600 text-xs mt-6">{settings.autoAdvance ? "advancing…" : "tap anywhere to continue"}</p>
            </div>
          )}
        </div>

        {/* Controls */}
        <div className="flex items-center justify-center gap-3 mt-5">
          <button
            onClick={repeat}
            className="flex items-center gap-2 px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold transition-colors"
          >
            <RotateCcw size={18} /> Repeat
          </button>
          {phase === PHASE.ANTICIPATION && (
            <button
              onClick={skipPause}
              className="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-white transition-colors"
              style={{ backgroundColor: SV_BLUE }}
            >
              Reveal <ChevronRight size={18} />
            </button>
          )}
          {phase === PHASE.REVEAL && (
            <button
              onClick={advance}
              className="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-white transition-colors"
              style={{ backgroundColor: SV_BLUE }}
            >
              {index + 1 >= sequence.length ? "Finish" : "Next"} <ChevronRight size={18} />
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* -------------------------------------------------------------------------
   8. LESSON COMPLETE
   ------------------------------------------------------------------------- */

function LessonComplete({ lesson, sequence, onHome, onNext, hasNext }) {
  const newCount = sequence.filter((s) => s.type === "new").length;
  const reviewCount = sequence.length - newCount;
  const vocab = lesson.items;

  return (
    <div className="max-w-2xl mx-auto px-5 py-10">
      <div className="text-center">
        <div
          className="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-5"
          style={{ backgroundColor: SV_BLUE }}
        >
          <Check size={40} className="text-white" strokeWidth={3} />
        </div>
        <h1 className="text-3xl font-extrabold text-white">¡Va pues! Lesson complete</h1>
        <p className="text-slate-400 mt-2">
          {lesson.title} · {lesson.subtitle}
        </p>
      </div>

      <div className="grid grid-cols-3 gap-3 mt-8">
        <Stat value={newCount} label="New words" />
        <Stat value={reviewCount} label="Reviews" accent />
        <Stat value={sequence.length} label="Total reps" />
      </div>

      <div className="mt-8 rounded-2xl bg-slate-800/70 border border-slate-700 p-5">
        <h2 className="font-bold text-white mb-4 flex items-center gap-2">
          <Sparkles size={16} style={{ color: SV_BLUE_SOFT }} /> What you learned
        </h2>
        <div className="space-y-3">
          {vocab.map((v) => (
            <div key={v.id} className="flex items-baseline justify-between gap-3 border-b border-slate-700/60 pb-2 last:border-0">
              <div>
                <span className="font-semibold" style={{ color: SV_BLUE_SOFT }}>
                  {v.targetEs}
                </span>
                {v.pron && <span className="text-slate-500 text-sm italic ml-2">[{v.pron}]</span>}
              </div>
              <span className="text-slate-400 text-sm text-right shrink-0">{v.promptEn}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="flex flex-col sm:flex-row gap-3 mt-7">
        <button
          onClick={onHome}
          className="flex-1 py-3.5 rounded-xl font-bold bg-slate-800 hover:bg-slate-700 text-slate-200 flex items-center justify-center gap-2 transition-colors"
        >
          <Home size={18} /> All lessons
        </button>
        {hasNext && (
          <button
            onClick={onNext}
            className="flex-1 py-3.5 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-transform active:scale-[0.99]"
            style={{ backgroundColor: SV_BLUE }}
          >
            Next lesson <ChevronRight size={18} />
          </button>
        )}
      </div>
    </div>
  );
}

function Stat({ value, label, accent }) {
  return (
    <div className="rounded-2xl bg-slate-800/70 border border-slate-700 p-4 text-center">
      <p className="text-3xl font-extrabold" style={{ color: accent ? SV_BLUE_SOFT : "white" }}>
        {value}
      </p>
      <p className="text-xs text-slate-400 mt-1">{label}</p>
    </div>
  );
}

/* -------------------------------------------------------------------------
   9. ROOT APP
   ------------------------------------------------------------------------- */

function App() {
  const { spanishVoices, englishVoices, supported } = useVoices();
  const [screen, setScreen] = useState("home"); // home | lesson | complete
  const [lessonId, setLessonId] = useState(null);
  const [finishedSequence, setFinishedSequence] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [settings, setSettings] = useState({
    rate: 0.85,
    pause: 4,
    showText: true,
    autoAdvance: true,
    ttsEnabled: true,
  });

  // Selected voices — default to the top-scored option once lists load.
  const [esVoice, setEsVoice] = useState(null);
  const [enVoice, setEnVoice] = useState(null);

  useEffect(() => {
    if (!esVoice && spanishVoices.length) setEsVoice(spanishVoices[0]);
  }, [spanishVoices, esVoice]);
  useEffect(() => {
    if (!enVoice && englishVoices.length) setEnVoice(englishVoices[0]);
  }, [englishVoices, enVoice]);

  const lesson = LESSONS.find((l) => l.id === lessonId) || null;
  const lessonIdx = LESSONS.findIndex((l) => l.id === lessonId);
  const hasNext = lessonIdx >= 0 && lessonIdx < LESSONS.length - 1;

  const selectLesson = (id) => {
    setLessonId(id);
    setScreen("lesson");
  };

  const handleComplete = (sequence) => {
    setFinishedSequence(sequence);
    setScreen("complete");
  };

  const goNext = () => {
    if (hasNext) {
      setLessonId(LESSONS[lessonIdx + 1].id);
      setScreen("lesson");
    }
  };

  return (
    <div className="min-h-screen w-full bg-slate-950 text-white font-sans" style={{ fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
      {/* subtle top accent bar — Salvadoran blue */}
      <div className="h-1.5 w-full" style={{ background: `linear-gradient(90deg, ${SV_BLUE}, ${SV_BLUE_SOFT}, ${SV_BLUE})` }} />

      {screen === "home" && (
        <LessonSelector
          onSelect={selectLesson}
          onOpenSettings={() => setShowSettings(true)}
          speechSupported={supported}
        />
      )}

      {screen === "lesson" && lesson && (
        <LessonEngine
          key={lesson.id}
          lesson={lesson}
          settings={settings}
          esVoice={esVoice}
          enVoice={enVoice}
          onExit={() => setScreen("home")}
          onComplete={handleComplete}
        />
      )}

      {screen === "complete" && lesson && (
        <LessonComplete
          lesson={lesson}
          sequence={finishedSequence}
          hasNext={hasNext}
          onHome={() => setScreen("home")}
          onNext={goNext}
        />
      )}

      {showSettings && (
        <SettingsPanel
          settings={settings}
          setSettings={setSettings}
          spanishVoices={spanishVoices}
          englishVoices={englishVoices}
          esVoice={esVoice}
          enVoice={enVoice}
          setEsVoice={setEsVoice}
          setEnVoice={setEnVoice}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);

  </script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</body>
</html>
